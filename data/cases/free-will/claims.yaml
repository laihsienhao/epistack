- id: libet-readiness-potential
  case: free-will
  text: "In experiments where subjects freely decide when to perform a simple voluntary action, measurable brain activity, a 'readiness potential' in EEG recordings, or decodable patterns in fMRI, precedes the subject's own reported moment of conscious decision, in some paradigms by several seconds."
  label: "Brain activity precedes reported conscious decisions"
  explanation: >-
    The foundational empirical finding, first shown by Benjamin Libet
    using EEG (a readiness potential 350-550ms before reported decision)
    and later extended by Chun Siong Soon and colleagues using fMRI, who
    found the outcome of a simple left/right button-press choice was
    decodable from prefrontal and parietal activity up to 10 seconds
    before the subject reported deciding. This raw finding is not itself
    in serious dispute; what is disputed is what, if anything, it shows
    about free will (see `neuroscience-relevance-contested`).
  status: reviewed
  tags: [topic:neuroscience]
  sources: [libet-1983-readiness-potential, soon-2008-unconscious-determinants]
  confidence: null
  author: 171384n
  created: 2026-07-21

- id: neuroscience-relevance-contested
  case: free-will
  text: "Whether the Libet/Soon readiness-potential findings actually show that unconscious brain activity determines a person's decision before they consciously choose, rather than reflecting spontaneous neural noise that happens to cross a detection threshold around the same time as an unrelated, later act of deciding, is a live methodological dispute."
  label: "Whether readiness potentials show the brain deciding first is contested"
  explanation: >-
    The central methodological controversy in this literature. Aaron
    Schurger and colleagues proposed that the readiness potential is the
    trace of ongoing stochastic neural activity crossing a decision
    threshold, not evidence of a discrete unconscious "decision", and a
    follow-up study by Schurger's own group found readiness-potential-like
    waveforms occurring in background EEG even when no movement followed,
    at rates matching this account. A separate line of work (Schlegel and
    colleagues) argued readiness potentials reflect processes dissociable
    from the moment of conscious willing on different grounds, and failed
    to replicate an earlier reported correlation between an EEG signal and
    conscious-will timing.

    Notably, Marcel Brass, a co-author of the original 2008 fMRI study,
    later co-authored a paper arguing neuroscience findings including his
    own do not disprove free will, cautioning against the strong
    interpretation his own earlier work is often given. Alfred Mele has
    separately argued at length, including in a monograph funded by the
    John Templeton Foundation (a funder with a specific philosophical and
    religion-friendly orientation on free-will topics, disclosed here as a
    funding relationship rather than a defect), that the simple
    button-press "urges" these studies measure are not the same kind of
    mental event as the deliberative choices the free-will debate is
    actually about.
  status: reviewed
  tags: [contested, topic:neuroscience]
  sources: [schurger-2012-accumulator-model, travers-2020-readiness-potentials-all-the-time, schlegel-2013-barking-up-wrong-free, mele-2008-testing-free-will, mele-2014-free-book, brass-furstenberg-mele-2019-neuroscience-does-not-disprove]
  confidence: null
  author: 171384n
  created: 2026-07-21

- id: determinism-belief-cheating-contested
  case: free-will
  text: "Whether inducing disbelief in free will causes people to behave worse, for example by cheating more, is a live and largely unresolved empirical question."
  label: "Whether disbelief in free will causes worse behavior is contested"
  explanation: >-
    Kathleen Vohs and Jonathan Schooler's widely-cited 2008 finding that
    reading a determinism-endorsing passage increased cheating on a
    subsequent task, relative to a neutral passage, is a real and famous
    result, but it has fared poorly under scrutiny. A direct replication
    found no effect, and "Many Labs 5," a large, pre-registered,
    multi-site replication (n=621) explicitly designed to address concerns
    about the original study's methodology, also found no reliable effect
    (d = 0.076, 95% CI crossing zero). A 2023 meta-analysis of 145
    experiments, spanning both published and unpublished studies, found
    that manipulating stated belief in free will works reliably, but that
    downstream behavioral effects like cheating are not reliably
    supported, and that the literature's apparent effect was likely driven
    by underpowered original studies. This does not bear directly on
    whether free will exists, but it does undermine a common practical
    objection to openly defending free-will skepticism, that doing so
    would be dangerous, since the feared behavioral consequence has not
    held up.
  status: reviewed
  tags: [contested, topic:psychological-consequences]
  sources: [vohs-schooler-2008-value-of-believing, embley-2015-replication, buttrick-2020-many-labs-5, genschow-2023-meta-analysis-belief-manipulation]
  confidence: null
  author: 171384n
