- id: libertarian-free-will
  case: free-will
  text: "Human beings possess free will in a robust, libertarian sense: at least some of our choices are not fully determined by prior causes, and this indeterminism is what allows us to be the genuine, ultimate source of our actions."
  label: "Libertarianism: free will needs indeterminism"
  explanation: >-
    The root thesis of libertarian (incompatibilist) free will, resting on
    three pillars: the Consequence Argument's case that determinism itself
    would rule out free will, a positive metaphysical account of how
    undetermined choice could still be an agent's own doing (agent-causal
    or event-causal), and an answer to the standard worry that
    indeterminism just introduces luck rather than control.
  status: reviewed
  tags: [root, thesis-libertarian]
  sources: []
  confidence: null
  author: 171384n
  created: 2026-07-21

- id: compatibilist-free-will
  case: free-will
  text: "Human beings possess free will in the sense that actually matters for moral responsibility and self-governance: acting from one's own reasons, desires, and values, free of external coercion or manipulation, regardless of whether the universe is deterministic."
  label: "Compatibilism: free will survives determinism"
  explanation: >-
    The root thesis of compatibilism, the majority position among
    professional philosophers per the most recent PhilPapers survey. Rests
    on redefining what free will and responsibility require, away from
    "could have done otherwise in the same circumstances" and toward
    reasons-responsiveness and ownership of one's own motivational
    structure, so that the truth of determinism becomes irrelevant to
    whether people are free.
  status: reviewed
  tags: [root, thesis-compatibilist]
  sources: []
  confidence: null
  author: 171384n
  created: 2026-07-21

- id: no-free-will
  case: free-will
  text: "Human beings lack free will in any sense robust enough to ground genuine, basic-desert moral responsibility, whether or not determinism is true: neither a fully determined nor an indeterministic universe supplies the kind of ultimate control this would require."
  label: "Determinism: free will does not exist"
  explanation: >-
    The root thesis of hard incompatibilism / free-will skepticism. Unlike
    classical hard determinism, this position does not need determinism to
    be true: it holds that indeterminism does not rescue responsibility
    either, since a partly random choice is no more "up to you" in the
    relevant sense than a fully caused one. The case rests on two largely
    independent lines of argument (Strawson's regress-based Basic Argument
    and Pereboom's manipulation argument), both of which presuppose that
    genuine responsibility requires "basic desert," being truly and
    ultimately deserving of praise or blame, rather than the more modest
    standard compatibilists offer.
  status: reviewed
  tags: [root, thesis-no-free-will]
  sources: []
  confidence: null
  author: 171384n
  created: 2026-07-21

- id: incompatibilism-consequence-argument
  case: free-will
  text: "If determinism is true, then every one of our acts is the inevitable consequence of the laws of nature and the state of the world before we were born, neither of which is up to us; therefore its consequences, including our present acts, are not up to us either."
  label: "Determinism would rule out being able to do otherwise"
  explanation: >-
    Peter van Inwagen's Consequence Argument, the canonical formal case
    for incompatibilism, the shared premise of both libertarianism and
    hard incompatibilism, which agree that free will and determinism
    cannot coexist and only disagree about which to give up. Compatibilists
    reject the argument's implicit assumption that responsibility requires
    the ability to do otherwise in exactly the same circumstances; see
    `frankfurt-cases-against-pap` for the standard compatibilist reply.
    The Stanford Encyclopedia of Philosophy's "Arguments for
    Incompatibilism" entry surveys the argument's several formal versions
    and the responses each has drawn.
  status: reviewed
  tags: [topic:incompatibilism]
  sources: [van-inwagen-1983-essay, vihvelin-sep-incompatibilism]
  confidence: null
  author: 171384n
  created: 2026-07-21

- id: agent-causal-libertarianism
  case: free-will
  text: "Free actions are caused directly by the agent as an irreducible cause, not merely by a chain of prior events or states, which is what allows a free choice to originate with the person rather than with antecedent causes."
  label: "Agents themselves, not just prior events, cause free actions"
  explanation: >-
    Timothy O'Connor's agent-causal account, one of two main positive
    metaphysical pictures of how libertarian free will could work (the
    other being event-causal accounts like Kane's, see
    `event-causal-libertarianism-quantum`). On this view, an agent's
    causing an action is a fundamentally different kind of causal relation
    than one event causing another, so a free choice is not just an
    undetermined event but the direct exercise of an agent's own causal
    power.
  status: reviewed
  tags: [topic:metaphysics-of-agency]
  sources: [oconnor-2000-persons-causes]
  confidence: null
  author: 171384n
  created: 2026-07-21

- id: event-causal-libertarianism-quantum
  case: free-will
  text: "At moments of genuine moral or motivational conflict ('self-forming actions'), amplified quantum-level indeterminacy in neural processing leaves the outcome genuinely undetermined until the agent resolves it, which is what allows the agent to be the ultimate source of that choice without the choice being fully caused by antecedent states."
  label: "Quantum indeterminacy can ground self-forming free choices"
  explanation: >-
    Robert Kane's event-causal libertarian account, and the standard
    citable answer to whether quantum indeterminacy specifically (rather
    than indeterminism in the abstract) could ground free will. Kane
    argues that self-forming actions, deliberate moments where a person's
    competing values and desires are genuinely in tension, are exactly
    where amplified indeterminacy at the neural level would leave the
    decision open in a way ordinary determined choices are not.
  status: reviewed
  tags: [topic:quantum-indeterminacy]
  sources: [kane-1996-significance]
  confidence: null
  author: 171384n
  created: 2026-07-21

- id: luck-argument-contested
  case: free-will
  text: "Whether indeterminism at the moment of choice grounds an agent's genuine control over that choice, or is simply luck (something that happens to the agent rather than something the agent does), is unresolved."
  label: "Whether indeterminism grounds control or is just luck is contested"
  explanation: >-
    Alfred Mele's "Luck Argument," the central objection to libertarian
    free will: if a choice is undetermined, then holding fixed everything
    about the agent up to the moment of choice, including their character,
    reasons, and deliberation, the choice could still have gone either way,
    which sounds less like the agent exercising control and more like a
    matter of chance. The Stanford Encyclopedia of Philosophy puts the
    objection vividly, comparing an undetermined neural event to "the
    spinning of a roulette wheel inside my brain." Kane's reply (see
    `event-causal-libertarianism-quantum`) is that self-forming actions are
    precisely the moments where an agent's whole prior character is
    already in tension, so the "luck" is not brute randomness but
    indeterminacy between options the agent has already, through their own
    history, made live options. Whether that reply actually answers the
    objection, rather than relabeling it, remains a live dispute.
  status: reviewed
  tags: [contested, topic:quantum-indeterminacy]
  sources: [mele-2006-free-will-luck, vihvelin-sep-incompatibilism]
  confidence: null
  author: 171384n
  created: 2026-07-21

- id: hierarchical-mesh-theory
  case: free-will
  text: "A person acts of their own free will when the desire driving their action is one they reflectively endorse at a higher level, that is, when their first-order desires align with their own second-order desires about which desires should move them, regardless of how that motivational structure came about."
  label: "Free will is acting on desires you reflectively endorse"
  explanation: >-
    Harry Frankfurt's hierarchical mesh theory of personhood and free will.
    On this view, what makes a want truly yours, and hence free, is not
    that it arose undetermined, but that you want to want it: an addict
    who wishes they did not crave a drug is unfree in a sense a person
    whose first- and second-order desires align is not, entirely
    independent of whether either state was itself causally determined.
  status: reviewed
  tags: [topic:compatibilism]
  sources: [frankfurt-1971-freedom-of-will]
  confidence: null
  author: 171384n
  created: 2026-07-21

- id: frankfurt-cases-against-pap
  case: free-will
  text: "Moral responsibility does not require that an agent could have done otherwise: a person can be fully responsible for an act even in a scenario where a counterfactual intervener would have forced the same outcome had the person shown any sign of choosing differently, since the intervener never actually needed to act."
  label: "Moral responsibility does not require alternate possibilities"
  explanation: >-
    Harry Frankfurt's counterexamples to the Principle of Alternate
    Possibilities (PAP), the assumption underlying the Consequence
    Argument that responsibility requires being able to do otherwise. A
    "Frankfurt case" describes a would-be manipulator poised to force a
    particular choice but who never has to intervene because the agent
    makes that choice on their own; the agent seems clearly responsible
    despite having no real alternative.

    The main incompatibilist reply is the "dilemma defense" (Widerker
    1995; independently, Kane): if the agent's actual choice was itself
    undetermined, the intervener would need some reliable prior sign to
    know when to step in, but no such deterministic sign can exist without
    already assuming determinism, so the case either begs the question
    against libertarians or collapses into an ordinary deterministic
    scenario. Whether Frankfurt cases survive this objection is itself
    contested within the literature, though it does not change that
    Frankfurt cases remain one supporting consideration among several for
    compatibilism (see `guidance-control-semicompatibilism` and
    `hierarchical-mesh-theory`), not the sole basis for it.
  status: reviewed
  tags: [topic:compatibilism, topic:moral-responsibility]
  sources: [frankfurt-1969-alternate-possibilities, widerker-1995-dilemma-defense]
  confidence: null
  author: 171384n
  created: 2026-07-21

- id: guidance-control-semicompatibilism
  case: free-will
  text: "Moral responsibility requires only that an action issue from a mechanism that is the agent's own and that is at least moderately responsive to reasons, not that the agent could have done otherwise or that the mechanism itself arose undetermined."
  label: "Responsibility requires reasons-responsive guidance, not alternate possibilities"
  explanation: >-
    John Martin Fischer and Mark Ravizza's "semi-compatibilism": rather
    than arguing free will itself is compatible with determinism, they
    argue moral responsibility is, via "guidance control," decoupling the
    entire question of responsibility from the deeper metaphysical dispute
    about whether libertarian free will is even possible. This is a
    distinct pillar from Frankfurt's mesh theory: it does not depend on
    Frankfurt cases succeeding against the dilemma defense, since guidance
    control asks only whether the actual mechanism producing the action is
    appropriately reasons-responsive, not whether alternate possibilities
    existed at all.
  status: reviewed
  tags: [topic:moral-responsibility]
  sources: [fischer-ravizza-1998-responsibility-control]
  confidence: null
  author: 171384n
  created: 2026-07-21

