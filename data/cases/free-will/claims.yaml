- id: harris-popular-illusionism
  case: free-will
  text: "Introspection on the actual moment of choosing reveals no freely choosing self behind one's thoughts and intentions: thoughts and intentions simply arise in consciousness, unauthored, which is enough to show that free will as ordinarily conceived is an illusion."
  label: "Introspection reveals no author behind our thoughts"
  explanation: >-
    Sam Harris's widely-read popular argument, distinct from the academic
    arguments elsewhere in this case: rather than a formal philosophical
    argument, it appeals directly to first-person introspection on where
    thoughts and intentions actually seem to come from. This is a
    popular-level trade essay, not a peer-reviewed academic contribution,
    a real distinction worth naming rather than treating it as
    equivalent in evidentiary weight to the academic literature it
    summarizes and popularizes.
  status: reviewed
