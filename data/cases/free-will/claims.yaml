- id: folk-intuitions-framing-contextual
  case: free-will
  text: "Ordinary people's intuitions about whether a determined agent has free will and is morally responsible depend heavily on how concretely the scenario is described: abstract descriptions of determinism tend to elicit incompatibilist intuitions, while concrete, emotionally engaging descriptions of a specific determined agent's specific choice tend to elicit compatibilist intuitions."
  label: "Concreteness of framing determines folk intuitions about free will"
  explanation: >-
    Eddy Nahmias and colleagues' empirical studies of folk intuitions
    found that when a deterministic scenario is described abstractly,
    people tend to judge the agent unfree, but when the same scenario is
    made concrete (a specific person, a specific act, described
    emotionally), people tend to judge the agent responsible after all.
    This is a contextual finding, not a genuinely unresolved dispute: the
    apparent conflict between "ordinary people are incompatibilist" and
    "ordinary people are compatibilist" is explained by the concreteness
    of the framing used to elicit the judgment, once you specify which
    kind of framing was used, the result is fairly predictable on each
    side. Cited here as modest support for compatibilism, since the more
    ecologically realistic framing (concrete, specific scenarios) is the
    one that tracks compatibilist intuitions.
  status: reviewed
  tags: [contextual, topic:moral-responsibility]
  sources: [nahmias-2005-surveying-freedom]
  confidence: null
  author: 171384n
  created: 2026-07-21

- id: basic-desert-responsibility-standard
  case: free-will
  text: "Whether genuine moral responsibility requires 'basic desert', that a person be truly and ultimately deserving of praise or blame in a way that does not reduce to any further fact about them, rather than merely being a reasons-responsive agent whose actions issue from a mechanism that is their own, is a live and unresolved question."
  label: "Whether responsibility requires basic desert is unresolved"
  explanation: >-
    Both of hard incompatibilism's main arguments (Strawson's Basic
    Argument and Pereboom's manipulation argument) are arguments that
    basic-desert responsibility is impossible; neither argument does any
    work against the compatibilist who simply denies that basic desert is
    the right standard for responsibility in the first place, and instead
    accepts something more modest like Fischer and Ravizza's guidance
    control. If basic desert is not actually required for the kind of
    responsibility that matters, hard incompatibilism's case collapses
    even if both of its arguments are individually sound, since they would
    be arguing against a standard nobody needs to meet. This is the single
    claim the whole no-free-will thesis is load-bearing on: it is not just
    one consideration among several, since both of the position's
    supporting arguments independently presuppose it.
  status: reviewed
  tags: [contested, topic:moral-responsibility]
  sources: [strawson-1994-basic-argument, pereboom-2001-living-without-free-will, fischer-ravizza-1998-responsibility-control]
  confidence: null
  author: 171384n
  created: 2026-07-21

- id: strawson-basic-argument
  case: free-will
  text: "To be truly, ultimately morally responsible for an action, a person would have to be responsible for the way they are, mentally speaking, in the relevant respects; but one cannot be responsible for the way one is without having chosen to be that way, and one cannot have chosen to be that way without already having existed with some prior character to do the choosing, which leads to an infinite regress that makes ultimate responsibility impossible."
  label: "Ultimate responsibility leads to an impossible infinite regress"
  explanation: >-
    Galen Strawson's "Basic Argument," argued to hold regardless of
    whether determinism or indeterminism is true, since the regress
    problem arises either way: whatever caused you to be the kind of
    person who makes the choices you make, you did not choose that in
    turn, all the way back. Strawson takes this to show ultimate moral
    responsibility, and hence the only kind of free will that would matter
    for it, is impossible in principle.
  status: reviewed
  tags: [topic:moral-responsibility]
  sources: [strawson-1994-basic-argument]
  confidence: null
  author: 171384n
  created: 2026-07-21

- id: manipulation-argument-against-compatibilism
  case: free-will
  text: "There is no principled difference between an agent whose every choice is directly, covertly engineered moment-to-moment by neuroscientists and an agent whose choices arise from an ordinary deterministic causal history stretching back before their birth; since the first agent is clearly not responsible, and compatibilism cannot identify a relevant difference, compatibilism cannot secure genuine responsibility either."
  label: "Manipulated agents and determined agents are not relevantly different"
  explanation: >-
    Derk Pereboom's four-case manipulation argument, built as a sequence of
    cases running from direct, moment-to-moment neural manipulation to
    ordinary determinism, with no principled stopping point in between
    where responsibility reappears. Because Pereboom's hard
    incompatibilism holds regardless of whether determinism or
    indeterminism is true, he separately argues that libertarian
    indeterminism does not escape the same problem: an event-causal
    "self-forming action" (see `event-causal-libertarianism-quantum`) is,
    from the agent's own perspective at the moment of choice, no more
    within their control than a fully determined one, since the
    indeterminacy is not itself something the agent controls.
  status: reviewed
  tags: [topic:manipulation-argument, topic:moral-responsibility]
  sources: [pereboom-2001-living-without-free-will, pereboom-2014-free-will-agency-meaning]
  confidence: null
  author: 171384n
  created: 2026-07-21

- id: sapolsky-biological-determinism
  case: free-will
  text: "A person's every action is fully explained by the interaction of their genes, prenatal environment, childhood experience, hormones, and immediate neurobiology, leaving no causal gap anywhere in the chain for a freely choosing self to intervene."
  label: "Biology fully explains behavior, leaving no room for a choosing self"
  explanation: >-
    Robert Sapolsky's biologically-grounded case against free will,
    synthesizing findings across genetics, endocrinology, developmental
    neuroscience, and neuroscience proper into a single cumulative
    argument that every choice, traced back far enough, resolves into
    factors the person never chose. Sapolsky explicitly addresses and
    rejects chaos theory and quantum indeterminacy as escape routes,
    arguing that neither supplies the kind of self-directed control free
    will would require.
  status: reviewed
  tags: [topic:neuroscience]
  sources: [sapolsky-2023-determined]
