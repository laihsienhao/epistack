- id: hawking-own-public-confidence
  case: lhc-black-holes
  text: "Stephen Hawking — the physicist whose own theoretical result the case's central evaporation argument rests on — publicly and repeatedly expressed confidence the LHC was safe enough that he hoped it would actually produce microscopic black holes, since observing their predicted evaporation would confirm his own theory."
  label: "Hawking himself publicly hoped the LHC would make black holes"
  explanation: >-
    In a 2008 public lecture, Hawking stated observing evaporating black
    holes at the LHC could earn him a Nobel Prize, saying "if they had, I
    would have got a Nobel prize" and "so, I might get a Nobel prize, after
    all" — a direct, primary-source statement of confidence in the safety
    case, from the theorist with the most personal stake in whether it holds.

    Separately, physicist Thomas Hertog's 2023 memoir recounts that during a
    2009 visit to CERN's ATLAS cavern (amid the ongoing Wagner/Sancho
    lawsuit), Hawking told CERN's Director-General, smiling, "I hope you'll
    make black holes."
  status: reviewed
