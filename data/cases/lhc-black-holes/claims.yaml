- id: lhc-direct-search-no-signal
  case: lhc-black-holes
  text: "Direct experimental searches by the CMS and ATLAS collaborations for microscopic black hole production and large-extra-dimension signatures at the LHC have found no evidence for either, excluding a range of theoretical models up to multi-TeV mass scales."
  label: "LHC's own searches have found no sign of this physics"
  explanation: >-
    Three separate collaboration results (2012, 2014, 2018) at increasing
    collision energies all report null results — no observed microscopic
    black holes, no observed large-extra-dimension signatures — each
    tightening the excluded mass range. This is direct empirical evidence
    bearing on whether the mechanism `extra-dimensions-dependency`
    describes actually exists at energies within reach, though it doesn't
    fully settle the question: higher, still-untested energies remain
    theoretically possible.
  status: reviewed
  tags: []
  sources: [cms-2012-microscopic-bh-search, atlas-2014-bh-string-balls-search, atlas-2018-strong-gravity-search]
  confidence: null
  author: 171384n
