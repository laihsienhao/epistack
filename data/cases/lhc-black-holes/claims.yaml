- id: extra-dimensions-dependency
  case: lhc-black-holes
  text: "Whether large extra spatial dimensions exist and lower the effective Planck scale to around 1 TeV — the specific theoretical mechanism that would need to be true for the LHC to produce a black hole at all — remains an open, unconfirmed question in fundamental physics."
  label: "Whether large extra dimensions exist at the TeV scale is unresolved"
  explanation: >-
    This is the actual crux of the dissenting position, though it's easy
    to miss: TeV-scale black hole production isn't just unlikely absent
    extra dimensions, it's mechanistically impossible under the Standard
    Model's ordinary four-dimensional gravity, where the Planck scale sits
    far beyond any conceivable collider's reach. Large-extra-dimensions
    models (Dimopoulos & Landsberg 2001; Giddings & Thomas 2002)
    specifically proposed lowering the effective Planck scale to ~1 TeV as
    a way black hole production could become possible at all.


    No collider data has confirmed this lowered-Planck-scale scenario —
    LHC's own direct searches (`lhc-direct-search-no-signal`) have found
    no signature of it so far, though higher untested energies remain
    theoretically possible. If large extra dimensions at this scale don't
    exist, the entire premise behind the dissenting root thesis has no
    mechanism to act through in the first place.


    Notably, this does *not* register as a crux for the safety root
    (`lhc-collisions-are-safe`): that thesis holds regardless of how this
    resolves, since it has independent arguments covering the case where
    black holes *are* produced. It only registers as a crux for the
    dissenting root, whose entire concern presupposes this mechanism is
    real.
  status: reviewed
  tags: [contested]
  sources: [dimopoulos-landsberg-2001, giddings-thomas-2002]
  confidence: null
  author: 171384n
  created: 2026-07-19

- id: plaga-metastable-risk-argument
  case: lhc-black-holes
  text: "Physicist Rainer Plaga argued that if a microscopic black hole were metastable rather than fully obeying idealized Hawking-radiation evaporation, its accretion of surrounding matter could become catastrophic before it fully evaporated — a risk he argued the mainstream safety analyses hadn't fully excluded."
  label: "A metastable black hole's accretion could outpace its evaporation"
  explanation: >-
    Plaga's argument (arXiv:0808.1415, 2008) was never peer-reviewed or
    published in a journal despite revisions, and was directly rebutted
    by Giddings & Mangano's targeted response (see
    `giddings-mangano-rebuttal-of-plaga`), which found the claimed
    catastrophic outcome doesn't hold once accretion and evaporation
    timescales are computed correctly.
  status: reviewed
