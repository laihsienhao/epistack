- id: giulini-nicolai-informal-rebuttal-of-rossler
  case: lhc-black-holes
  text: "CERN physicist Rolf Landua asked Hermann Nicolai, director of the Max Planck Institute for Gravitational Physics (Albert Einstein Institute), to review Otto Rössler's general-relativity argument; Nicolai concluded it would not pass peer review at a serious journal, and Nicolai together with physicist Domenico Giulini publicly stated the argument concerns only general relativity, has no logical connection to LHC physics, and is neither valid nor self-consistent."
  label: "Physicists publicly assessed Rössler's argument as invalid"
  explanation: >-
    Worth being precise about what this is: a documented public and
    informal assessment (recorded in secondary sources, including a law
    review article examining the LHC lawsuits), not a published,
    peer-reviewed rebuttal paper. It's included because it's a real,
    verifiable, direct response to a real, named critic's specific
    technical claim — not because it carries the same evidentiary weight
    as a journal publication.
  status: reviewed
  tags: [topic:hawking-radiation]
  sources: [johnson-2009-black-hole-case]
