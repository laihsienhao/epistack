- id: hawking-radiation-evaporation-argument
  case: lhc-black-holes
  text: "Any microscopic black hole produced at LHC energies would sit far above the Planck-mass scale in a regime where Hawking radiation causes it to evaporate via thermal radiation almost instantaneously, long before it could accrete any meaningful mass."
  label: "Microscopic black holes would evaporate almost instantly"
  explanation: >-
    This is the primary mechanism argument in CERN's official LHC Safety
    Assessment Group (LSAG) report: standard quantum-field-theory-on-
    curved-spacetime treatments predict near-instant evaporation for a
    TeV-scale black hole.


    A real caveat worth naming plainly: Hawking radiation itself has never
    been directly experimentally observed — it remains a theoretical
    prediction, not a measured phenomenon. That gap is precisely what
    Otto Rössler's dissenting argument (see
    `rossler-general-relativity-critique`) tries to exploit, and what
    physicists' rebuttal of his specific claim addresses directly (see
    `giulini-nicolai-informal-rebuttal-of-rossler`).


    Worth a scoping note, since it sounds related but isn't: a genuine,
    actively-discussed line of mainstream quantum-gravity research (e.g.
    Rovelli & Vidotto's "Planck stars" proposal, and a substantial body of
    black-hole-remnant literature) questions whether Hawking evaporation
    goes to full completion — but only at the very end of evaporation, as
    a black hole's mass approaches the Planck scale (~10^19 GeV) and
    trans-Planckian quantum-gravity effects take over. This has no bearing
    on whether a much heavier TeV-scale black hole evaporates promptly,
    which is not in dispute in that literature. It's not evidence for this
    claim and isn't cited as such — it's flagged here only so the
    distinction is explicit rather than left for a reader to wonder about.
  status: reviewed
  tags: [topic:hawking-radiation]
  sources: [lsag-report]
  confidence: null
  author: 171384n
  created: 2026-07-19

- id: cosmic-ray-natural-experiment-argument
  case: lhc-black-holes
  text: "Cosmic rays have struck the Earth's atmosphere, the Sun, and other astronomical bodies at energies far exceeding those of the LHC for billions of years without producing any destructive consequence, bounding the risk from any black holes the LHC could produce to be negligible."
  label: "Cosmic rays already hit far higher energies with no harm done"
  explanation: >-
    This argument's methodology traces back to Jaffe, Busza, Sandweiss &
    Wilczek's 2000 review of speculative disaster scenarios at RHIC (the
    Relativistic Heavy Ion Collider), which Giddings & Mangano extended
    specifically to LHC-scale collisions in 2008: since Earth and other
    astronomical bodies have already absorbed a vast number of far
    higher-energy natural collisions over cosmic timescales with no
    observed ill effect, any equivalent process at the LHC is bounded to
    be similarly harmless.
  status: reviewed
  tags: []
  sources: [giddings-mangano-2008, jaffe-busza-sandweiss-wilczek-2000]
  confidence: null
  author: 171384n
  created: 2026-07-19

- id: gravitational-capture-gap-closed-by-stellar-bound
  case: lhc-black-holes
  text: "The basic cosmic-ray comparison has a gap: an LHC-produced black hole would typically be moving too slowly to escape Earth's gravity, unlike a fast-moving cosmic-ray-produced one that would simply pass through — but cosmic rays of comparable energy have struck far denser white dwarfs and neutron stars for billions of years, and any destructive accretion in a captured black hole would already have caused those objects to visibly collapse, which is not observed."
  label: "Denser stars close the 'could Earth capture it' gap in that argument"
  explanation: >-
    Giddings & Mangano's 2008 paper confirms LHC-produced black holes
    would typically be ejected at a velocity exceeding Earth's escape
    velocity and would simply pass through — but for the hypothetical
    exceptional case where one is captured, they derive a separate,
    complementary bound: white dwarfs and neutron stars are struck by
    cosmic rays of comparable or higher energy, and any black hole capable
    of destructive accretion would already have caused these far denser
    objects to collapse on observable timescales, which hasn't happened.


    Both stellar types are needed, not just one: neutron stars' intense
    surface magnetic fields deflect or attenuate which cosmic rays
    penetrate deep enough to matter, so white dwarfs (with much weaker
    fields) provide a cleaner, complementary constraint covering the gap
    neutron stars alone leave open.
  status: reviewed
  tags: []
  sources: [giddings-mangano-2008]
  confidence: null
  author: 171384n
  created: 2026-07-19

- id: giddings-mangano-rebuttal-of-plaga
  case: lhc-black-holes
  text: "Giddings and Mangano directly analyzed Rainer Plaga's specific claim that a metastable black hole could pose a catastrophic risk before fully evaporating, and found the claimed risk does not hold once the actual accretion and evaporation timescales are computed correctly."
  label: "The specific 'metastable black hole' risk argument doesn't hold up"
  explanation: >-
    Published as a direct, targeted response (arXiv:0808.4087) to Plaga's
    argument (see `plaga-metastable-risk-argument`) — rather than a
    general restatement of the evaporation argument, this paper works
    through Plaga's own proposed mechanism specifically and finds it
    doesn't produce the catastrophic outcome he described.
