- id: lhc-collisions-are-safe
  case: lhc-black-holes
  text: "Taken as a whole, the safety case for LHC collisions — Hawking-radiation evaporation, decades of higher-energy natural cosmic-ray collisions with no destructive consequence, and the absence of any experimental signal for the extra-dimensional physics a dangerous black hole would even require in the first place — shows that LHC operation poses no meaningful risk of a runaway black hole or other destructive exotic remnant."
  label: "LHC black holes pose no real danger"
  explanation: >-
    The umbrella root thesis on the consensus side, backed by several
    independent, chained safety arguments (Hawking-radiation evaporation,
    the cosmic-ray natural-experiment argument and its own internal
    gravitational-capture-gap closure, direct rebuttals of the two named
    dissenting critics, and the LHC's own null-result experimental
    searches) rather than a single argument the whole thesis rests on.


    Because each pillar is independently sufficient rather than
    individually necessary, no single sub-question here registers as a
    crux for this root — the same structural pattern documented on the
    `eggs` case's broadened roots, discovered here on freshly-researched
    content rather than designed in advance.
  status: reviewed
  tags: [root, thesis-safe]
  sources: []
  confidence: null
  author: 171384n
  created: 2026-07-19

- id: lhc-risk-not-fully-excluded
  case: lhc-black-holes
  text: "A small number of named critics — physicist Rainer Plaga, biochemist and systems theorist Otto Rössler, and the plaintiffs behind 2008 legal challenges against CERN — have each argued that specific gaps or errors in the mainstream safety arguments mean the risk of a dangerous black hole (or other exotic remnant) from LHC collisions has not been fully and rigorously excluded, even though their individual technical objections were each addressed by physicists and never gained peer-reviewed traction."
  label: "LHC black-hole risk isn't fully ruled out"
  explanation: >-
    The umbrella root thesis on the dissenting side. Unlike `eggs`'s two
    roots, this is not a comparably-weighted rival position — it
    represents a handful of named individuals, not an institutional or
    peer-reviewed body of support. The graph models it as its own root
    regardless, since disagreement here is still structural (a separate
    tree), not an edge — and its entire live relevance turns on exactly
    one open question, surfaced as this root's crux (see
    `extra-dimensions-dependency`).
  status: reviewed
  tags: [root, thesis-dissent]
  sources: []
