- id: aps-independent-endorsement-of-safety-argument
  case: lhc-black-holes
  text: "Beyond CERN's own internal review, the American Physical Society's own commentary venue independently highlighted and endorsed the Giddings-Mangano cosmic-ray safety argument as sound, via a named theorist with no involvement in the original papers or CERN's own review process."
  label: "An outside physicist's independent commentary endorsed the safety case"
  explanation: >-
    Michael Peskin (SLAC/Stanford, co-author of the standard graduate
    quantum-field-theory textbook) published a "Viewpoint" commentary in the
    American Physical Society's Physics — a venue that selects and endorses
    noteworthy physics results — affirming the Giddings-Mangano astrophysical
    safety argument. This is independent in a specific sense worth being
    precise about: independent of CERN's own institutional review process,
    not independent of the broader physics community that authored the
    argument itself.
