- id: stable-remnant-scenario-also-excluded
  case: lhc-black-holes
  text: "Even under the hypothetical scenario the Hawking-radiation-evaporation argument doesn't itself directly address — that a microscopic black hole might not fully evaporate but instead settle into a stable remnant — a separate analysis found such a remnant still could not pose a danger, using two additional independent mechanisms: electromagnetic deceleration of any charge-accreting black hole passing through stellar matter, and a velocity decrease from its own mass growth."
  label: "A stable black-hole remnant, if one formed, would still pose no danger"
  explanation: >-
    Koch, Bleicher, and Stocker (2009) address the specific scenario left
    open if Hawking evaporation somehow didn't go to completion: they argue
    a stable remnant would still be electromagnetically decelerated while
    passing through stellar matter, and would slow further as it grows in
    mass, before it could accrete enough to become dangerous — again
    anchored to the observed billions-of-year survival of white dwarfs and
    neutron stars under real cosmic-ray bombardment. This is a distinct
    pillar from the existing gravitational-capture-gap argument: a different
    paper, addressing a different specific mechanism (electromagnetic
    deceleration and mass-growth-driven velocity loss, not just escape
    velocity), for a scenario the case's other evaporation-based arguments
    don't themselves cover.
  status: reviewed
  tags: [topic:metastable-evaporation]
  sources: [koch-bleicher-stocker-2009-remnant-exclusion]
  confidence: null
  author: 171384n
  created: 2026-07-19

- id: rhic-strangelet-search-corroborates-pattern
  case: lhc-black-holes
  text: "A parallel experimental search by the STAR Collaboration at RHIC for strangelets — a different hypothetical exotic-matter risk raised alongside black holes in the same 2008 legal challenges — likewise found no evidence across 100 million real collision events, corroborating the broader pattern that direct experimental searches for exotic collider risk scenarios consistently return null results."
  label: "A parallel search for a different exotic risk also found nothing"
  explanation: >-
    Deliberately scoped as a corroborating, adjacent finding rather than
    black-hole evidence itself: strangelets are a different hypothesized
    form of exotic matter, not a black hole, but Wagner and Sancho's
    original legal challenge (see `lawsuits-and-legal-history`) alleged
    risk from both together. This search is also a genuinely different
    evidentiary category from most of this case's other safety arguments:
    an actual empirical search of 100 million real collected RHIC
    collision events with a null result, rather than a pre-operational
    theoretical prediction (like Jaffe et al. 2000) or an astrophysical
    natural-experiment bound.
  status: reviewed
