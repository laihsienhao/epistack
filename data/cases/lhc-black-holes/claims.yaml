- id: rossler-general-relativity-critique
  case: lhc-black-holes
  text: "Otto Rössler, a biochemist and systems theorist, argued that the standard derivation of Hawking radiation conflates coordinate time with proper time in the Schwarzschild metric, implying that microscopic black holes would grow rather than evaporate — a claim never published in a peer-reviewed physics journal."
  label: "Rössler claimed a hidden error in the Hawking radiation derivation"
  explanation: >-
    Rössler's papers (including "Abraham-Solution to Schwarzschild Metric
    Implies That CERN Miniblack Holes Pose a Planetary Risk," 2008) were
    self-hosted or conference-adjacent rather than arXiv-posted or
    peer-reviewed. A direct technical rebuttal exists: Gerhard Bruhn (TU
    Darmstadt) argues Rössler misreads the metric, conflating a coordinate
    artifact with a physical effect. See also
    `giulini-nicolai-informal-rebuttal-of-rossler` for the physicists'
    public assessment of the same argument.
  status: reviewed
  tags: [contested, topic:hawking-radiation]
  sources: [rossler-2008-abraham-solution, bruhn-2008-commentary]
  confidence: null
  author: 171384n
  created: 2026-07-19

- id: lawsuits-and-legal-history
  case: lhc-black-holes
  text: "In 2008, Walter Wagner and Luis Sancho filed a US lawsuit (and Otto Rössler pursued parallel actions before the European Court of Human Rights and German courts) seeking to halt LHC operation over alleged risk from black holes, strangelets, and magnetic monopoles collectively; every filing was dismissed on jurisdictional or standing grounds rather than on scientific merit, with the US case closed on appeal in 2010 and the German proceedings concluding by 2012."
  label: "Legal challenges to halt the LHC were all dismissed, not on the science"
  explanation: >-
    An uncontested baseline fact both sides build on — reachable from both
    roots, so it renders as a shared ground truth. Wagner & Sancho's US
    suit (578 F. Supp. 2d 1258, D. Haw. 2008) was dismissed for lack of
    jurisdiction in September 2008; Nobel laureates Sheldon Glashow and
    Frank Wilczek, together with Harvard's Richard Wilson, filed an amicus
    brief rebutting the doomsday claims in the 9th Circuit appeal (Case No.
    08-17389) in April 2009, ahead of the circuit's eventual affirmance on
    standing grounds in August 2010. Rössler's parallel European Court of
    Human Rights filing was rejected the same day it was filed (August
    2008); his German domestic court petitions were rejected in 2010 and
    again in 2011–2012. None of these proceedings ever reached a ruling on
    the underlying physics.
  status: reviewed
  tags: [ground-truth, fact]
  sources: [symmetry-2010-lhc-lawsuit-dismissed, physorg-2010-lhc-lawsuit-dismissed, nbc-2008-doomsday-fears-lawsuit, nbc-2010-collider-court-case-closed]
  confidence: null
  author: 171384n
  created: 2026-07-19

- id: cern-spc-independent-review-and-2015-reaffirmation
  case: lhc-black-holes
  text: "CERN's Scientific Policy Committee — a body of external, non-CERN scientists including Nobel laureate Gerard 't Hooft — independently reviewed and unanimously endorsed the LSAG safety report in 2008, and CERN issued a further updated review, likewise endorsed by the Scientific Policy Committee, before the Large Hadron Collider's 2015 Run 2 restart at a substantially higher (13 TeV) collision energy."
  label: "The safety case was independently reviewed twice, including before a real energy increase"
  explanation: >-
    A five-member Scientific Policy Committee panel (Peter Braun-Munzinger,
    Matteo Cavalli-Sforza, Gerard 't Hooft, Bryan Webber, and Fabio
    Zwirner) reviewed both the LSAG report and the Giddings-Mangano paper
    in detail and endorsed the authors' approach; the full committee then
    agreed unanimously — an external check on CERN's own internal safety
    review, not just a restatement of it.


    The updated review ahead of 2015's higher-energy Run 2 restart matters
    structurally: it's a second, independent point in time where the
    safety case was re-examined against a real, materially different
    operating condition (13 TeV instead of 2008's 7-8 TeV), rather than a
    single assessment that was simply never revisited.
  status: reviewed
