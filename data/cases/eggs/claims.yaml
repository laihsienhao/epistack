- id: egg-protein-quality-benefit
  case: eggs
  text: "Whole egg provides complete, highly digestible protein (DIAAS about 101, rated 'excellent'), and this protein quality translates into a measurably greater muscle-protein-synthesis response after exercise compared with egg whites alone despite similar leucine content — suggesting non-protein yolk components also contribute to the anabolic response."
  label: "Egg protein is complete, high-quality, and builds muscle"
  explanation: >-
    Herreman et al. 2020's review situates whole egg's DIAAS at about 101
    ('excellent', >=100), ahead of whey (85) and soy (91) — though the
    review authors caution DIAAS reflects amino-acid digestibility only, not
    confirmed muscle-building outcomes on its own.


    That confirmation comes from van Vliet et al. 2017: in resistance-trained
    young men given protein-matched doses after exercise, whole-egg
    ingestion increased post-exercise muscle protein synthesis more than
    isonitrogenous egg whites, despite similar leucine availability,
    implying yolk fat/micronutrients also matter, not just protein content.
  status: reviewed
  tags: [thesis-healthy]
  sources: [herreman-2020-diaas-review, van-vliet-2017-whole-egg-mps]
  confidence: null
  author: 171384n
  created: 2026-07-17

- id: egg-satiety-effect-contested
  case: eggs
  text: "Whether eggs' satiety benefit comes from their protein quality specifically, or simply from protein quantity that any similar source could provide, is contested: follow-up crossover trials matching total protein quantity between egg and cereal breakfasts found no significant difference in appetite hormones or subsequent energy intake, suggesting higher protein quality alone may be insufficient to drive satiety once quantity is controlled for."
  label: "Whether eggs' fullness effect is special, or just protein amount, is contested"
  explanation: >-
    In a controlled crossover trial, an isocaloric egg breakfast produced
    greater fullness before lunch than a bagel breakfast, and participants
    ate significantly less at lunch afterward (2405.6 vs 3091.3 kJ,
    p<0.0001), with reduced intake persisting for the following 36 hours
    (Vander Wal et al. 2005).


    In an 8-week energy-restricted diet trial, participants eating an egg
    breakfast lost 65% more weight than those eating a bagel breakfast of
    equal calories (2.63 kg vs 1.59 kg), though the effect required
    combining eggs with an overall calorie deficit (Vander Wal et al. 2008).


    Follow-up crossover trials matching total protein quantity between egg
    and cereal breakfasts, however, found no significant difference in
    appetite hormones or subsequent energy intake, suggesting higher protein
    quality alone may be insufficient to drive satiety once quantity is
    controlled for (Zhu et al. 2022).
  status: reviewed
  tags: [contested]
  sources: [zhu-2022-egg-cereal-nuance, vander-wal-2005-egg-satiety, vander-wal-2008-egg-weight-loss]
  confidence: null
  author: 171384n
