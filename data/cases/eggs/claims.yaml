- id: eggs-are-unhealthy
  case: eggs
  text: "Taken as a whole, the cumulative evidence across cardiovascular, metabolic, food-safety, and allergenic pathways shows that egg consumption carries meaningful health risks that argue for limiting or avoiding eggs."
  label: "Eggs are unhealthy"
  explanation: >-
    The umbrella root thesis on the 'unhealthy' side, sitting above
    eggs-should-be-limited (the cholesterol-specific sub-thesis) and several
    independent, non-cholesterol pillars: TMAO from gut-bacterial choline
    metabolism (tmao-cvd-risk-contested), an association with type 2
    diabetes risk (egg-t2d-association-region-dependent), the cardiovascular
    relevance of eggs' own saturated fat content
