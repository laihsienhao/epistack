- id: saturated-fat-cvd-link-contested
  case: eggs
  text: "Saturated fat's cardiovascular relevance depends significantly on its food source: a 2020 state-of-the-art review found its impact varies substantially by food matrix, with no consistent RCT/observational evidence that reducing saturated fat generically improves cardiovascular or mortality outcomes, arguing for food-based rather than nutrient-based dietary limits."
  label: "Saturated fat's heart-disease impact depends on its food source"
  explanation: >-
    One large egg contains about 1.6 g of saturated fat (~3.1 g/100g), about
    12% of the American Heart Association's recommended daily saturated-fat
    limit (~13g on a 2000-calorie diet) (USDA FoodData Central).


    In a randomized cross-over trial isolating cholesterol from saturated
    fat across three matched diets, saturated fat intake — not dietary
    cholesterol from eggs — was significantly associated with higher LDL; a
    low-saturated-fat diet including 2 eggs/day produced lower LDL than an
    egg-free, high-saturated-fat control diet (Carter et al. 2025, AJCN).


    But raising LDL doesn't automatically mean raising real-world
    cardiovascular risk by the same amount: a 2020 state-of-the-art review
    found recent meta-analyses of RCTs and observational studies show no
    consistent CVD/mortality benefit from reducing saturated fat generically,
    that its LDL effect is mainly via larger, less atherogenic LDL particles,
    and that its cardiovascular impact varies substantially by food source
    (food-matrix effects) — arguing for food-based rather than
    nutrient-based dietary limits (Astrup et al. 2020, JACC).
  status: reviewed
  tags: [contextual]
  sources: [astrup-2020-jacc-satfat-food-matrix, usda-fdc-egg-171287, ajcn2025]
  confidence: null
  author: 171384n
  created: 2026-07-17

- id: cooking-oxidation-cop-contested
  case: eggs
  text: "The cardiovascular relevance of cholesterol oxidation products (COPs) from eggs depends heavily on cooking method and storage: frying and long-term storage measurably increase COP/oxysterol formation, mechanistically linked to atherosclerosis, while common quick home-cooking methods (frying and scrambling right away) produce minimal oxidation — so the real risk concentrates in specific preparation practices rather than being an inherent property of eggs."
  label: "Egg cooking method and storage determine cholesterol-oxidation risk"
  explanation: >-
    Frying eggs produces substantially higher levels of cholesterol
    oxidation products (COPs, e.g. 7-ketocholesterol,
    7-alpha/7-beta-hydroxycholesterol) than boiling, and COP levels rise
    progressively with storage time and temperature while beneficial
    omega-3s and vitamin E decline (Mazalli & Bragagnolo 2009).


    Thermal processing used to make powdered/dehydrated egg products
    initiates oxysterol formation, and extended room-temperature storage (up
    to 24 months) further increases oxysterol content (Chudy & Teichert
    2021).


    Mechanistically, oxysterols enriched in oxidized LDL accumulate in
    atherosclerotic plaques and contribute to endothelial dysfunction,
    foam-cell formation, smooth-muscle proliferation, and plaque
    destabilization (Luquain-Costaz & Delton 2024).


    A study of common quick home-cooking methods (frying and scrambling in
    various fats), however, found minimal lipid oxidation (Ferreira et al.
    2022) — so the practical risk is concentrated in specific preparation
    and storage practices (frying, long-term storage of powdered/dehydrated
    egg), not in eggs generically.
  status: reviewed
  tags: [contextual]
  sources: [fried-scrambled-eggs-lipid-quality, cop-thermal-storage-eggs, oxysterols-stored-powders, oxysterols-atherosclerosis-mechanism]
  confidence: null
  author: 171384n
  created: 2026-07-17

- id: egg-salmonella-risk-contested
  case: eggs
  text: "Salmonella risk from eggs depends heavily on handling and cooking practice: absolute per-egg contamination risk is already small (~1 in 20,000) and has been further reduced by modern safety regulation, and thoroughly cooking eggs rather than eating them raw or undercooked further minimizes risk — so for properly handled, well-cooked eggs the practical risk is low, even though foodborne illness still occurs when eggs are undercooked or mishandled."
  label: "Egg handling and cooking practice determine Salmonella risk"
  explanation: >-
    Prior to modern safety regulation, an estimated 1 in 20,000 eggs in the
    US was internally contaminated with Salmonella Enteritidis, modeled to
    cause roughly 182,000 illnesses and about 70 deaths in the US in 2000
    alone (Ebel & Schlosser 2000; Schroeder et al. 2005, CDC).


    The FDA's 2009 Egg Safety Rule, requiring Salmonella-prevention measures
    (biosecurity, pest control, testing) and refrigeration for large
    shell-egg producers, is projected to prevent about 79,000 illnesses and
    30 deaths per year, cutting egg-attributable Salmonella infections by
    nearly 60% — and thoroughly cooking eggs (rather than eating them raw or
    undercooked) further reduces the residual risk, concentrating most
    remaining harm in undercooked or mishandled eggs specifically.
  status: reviewed
  tags: [contextual]
  sources: [ebel-schlosser-2000-contamination-fraction, cdc-eid-se-egg-illness-estimate-2000, fda-egg-safety-final-rule]
  confidence: null
