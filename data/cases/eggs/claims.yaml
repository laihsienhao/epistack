- id: egg-allergenicity-narrow-but-real-risk
  case: eggs
  text: "Egg allergy is a real health risk from eggs, but a narrow one: it affects a small minority of the population (concentrated in early childhood, around 1-2% at peak), most cases resolve with age, and most reactions when they occur are mild to moderate rather than life-threatening — though undiagnosed severe reactions do happen."
  label: "Egg allergy is a real but narrow risk, mostly in young children"
  explanation: >-
    In a nationally representative US survey, egg allergy affected about
    0.9% of all children, peaking near 2% at ages 1-2; about 64% of
    egg-allergic children tolerated baked egg, and nearly half had comorbid
    asthma (Samady et al. 2020).


    Most children eventually outgrow egg allergy, but resolution is gradual:
    about 4% resolve by age 4, 12% by age 6, 37% by age 10, and 68% by age
    16 — children with very high egg-specific IgE are unlikely to become
    tolerant (Savage et al. 2007).


    In a registry of 302 children with egg-induced anaphylaxis, most
    reactions were mild (30.5%) to moderate (60.3%), only 9.3% were severe,
    and only 1.4% required hospital admission — though 61% of affected
    children had no prior egg-allergy diagnosis before the reaction (Prosty
    et al. 2024).
  status: reviewed
  tags: [thesis-unhealthy]
  sources: [egg-allergy-prevalence-us-children, egg-allergy-natural-history-savage, egg-induced-anaphylaxis-severity-prosty]
  confidence: null
