- id: egg-choline-benefit
  case: eggs
  text: "Eggs are a practical way to meet choline intake that most people fall short on, and adequate choline matters for both liver health and, via prenatal intake, offspring cognitive development."
  label: "Eggs are a practical, meaningful source of health-supporting choline"
  explanation: >-
    Only about 8% of US adults (8.5% of pregnant women) meet the adequate
    intake for choline, but egg consumers get nearly double the choline
    intake of non-consumers (525 vs 294 mg/day), and 57% of egg consumers
    meet the AI vs. just 2.4% of non-consumers (Wallace & Fulgoni 2017,
    NHANES) — eggs are a practical way to close this gap.


    The AI matters because choline deficiency causes real harm: in a
    controlled deprivation study, most men (77%) and postmenopausal women
    (80%) developed fatty liver or muscle-damage markers on insufficient
    choline intake (NIH Office of Dietary Supplements).


    Choline also appears to matter for offspring cognition: in a randomized
    trial, children of mothers given higher-dose (930 vs ~480 mg/day)
    choline in the third trimester showed significantly better sustained
    attention at age 7 (Bahnfleth et al. 2022).
  status: reviewed
  tags: [thesis-healthy]
  sources: [wallace-fulgoni-2017-nhanes-choline-eggs, nih-ods-choline-professional, bahnfleth-2022-prenatal-choline-attention]
