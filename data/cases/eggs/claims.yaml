- id: individual-cholesterol-response-variability
  case: eggs
  text: "There is substantial individual variability in serum cholesterol response to dietary cholesterol: 'hyper-responders' show large increases while 'hypo-responders' show little to no change from the same intake."
  label: "Some people's cholesterol barely reacts to eggs; others react strongly"
  explanation: "The classic Katan/Beynen finding. Both sides accept this happens, but it cuts differently for each: the 'fine in moderation' side reads it as 'most people are hypo-responders, so average-case caution overstates personal risk'; the 'should be limited' side reads it as 'some people are hyper-responders and face meaningfully elevated risk, which argues for caution.'"
  status: reviewed
  tags: [mechanism, ground-truth]
  sources: [katan1987]
  confidence: null
  author: 171384n
  created: 2026-07-13

- id: cholesterol-causal-effect-contested
  case: eggs
  text: "Whether dietary cholesterol from eggs has a genuine causal effect on cardiovascular disease risk independent of confounders (especially saturated fat intake and overall dietary pattern) is unresolved."
  label: "Whether egg cholesterol truly causes heart disease is unresolved"
  explanation: "The actual double crux of the debate — and it doesn't split cleanly along RCT-vs-cohort lines. Cohort studies (JAMA 2019, Circulation 2022) consistently find a significant dose-response association between dietary cholesterol/eggs and CVD/mortality even after standard covariate adjustment, while RCT evidence is itself mixed: a 2025 cross-over trial isolating cholesterol from saturated fat (AJCN) found no LDL effect from cholesterol specifically, but a meta-analysis of 66 RCTs (Khalighi Sikaroudi et al. 2020) found egg consumption does raise LDL, especially at higher intakes in short trials. If this resolves toward 'no independent causal effect — cohort associations reflect residual confounding, and short RCTs don't capture real long-run risk,' thesis A stands on its strongest ground; if it resolves toward 'a genuine causal effect that most short RCTs are underpowered or too brief to fully capture,' thesis B stands instead."
  status: reviewed
  tags: [crux, double-crux]
  sources: [ajcn2025, jama2019, khalighi2020]
  confidence: null
  author: 171384n
  created: 2026-07-13

