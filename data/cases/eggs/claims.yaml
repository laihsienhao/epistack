- id: eggs-fine-in-moderation
  case: eggs
  text: "For most healthy people, dietary cholesterol from eggs eaten in moderation is not a meaningful cardiovascular risk factor."
  label: "Eggs in moderation aren't a real heart risk for most people"
  explanation: >-
    The cholesterol/CVD sub-thesis on the 'healthy' side — no longer a root
    itself; it now feeds into the broader eggs-are-healthy thesis alongside
    independent, non-cholesterol pillars (protein quality, satiety, choline,
    lutein/zeaxanthin, micronutrient density). The 'moderation' framing still
    matters on its own terms — this side does not claim eggs are risk-free at
    any quantity, only that typical moderate intake (roughly 1-2 eggs/day) is
    not a meaningful independent CVD risk driver for most people.


    The direct evidence for this side: most people are hypo-responders whose
    serum cholesterol barely moves with dietary cholesterol intake
    (Katan/Beynen 1987). A randomized cross-over trial (n=61) found dietary
    cholesterol from 2 eggs/day wasn't significantly associated with LDL,
    while saturated fat was the actual driver of LDL differences across
    matched diets (Carter et al. 2025, AJCN). A dose-response meta-analysis
    of 55 prospective cohorts (n=2,772,486) found no significant association
    between egg or dietary-cholesterol intake and CVD-specific mortality
    (Frontiers in Nutrition 2022).


    A randomized trial (n=105 healthy adults, the Eggant study) found 2 whole
    eggs/day for 8 weeks produced no significant change in LDL, HDL, or
    triglycerides vs. an egg-white control (Galvis et al. 2023). And the
    American Heart Association's 2019 science advisory allows healthy adults
    up to 1 egg/day (2/day for healthy older adults) as part of an overall
    healthy pattern, rather than setting a strict cholesterol cap.
  status: reviewed
  tags: [thesis-a]
  sources: [katan1987, ajcn2025, frontiers2022, galvis2023, aha-news-2023]
  confidence: null
  author: 171384n
  created: 2026-07-13

- id: eggs-should-be-limited
  case: eggs
  text: "Dietary cholesterol from eggs meaningfully raises cardiovascular disease and mortality risk, and intake should be limited."
  label: "Egg cholesterol meaningfully raises heart disease and death risk"
  explanation: >-
    The cholesterol/CVD sub-thesis on the 'unhealthy' side, rival to
    eggs-fine-in-moderation. No longer a root itself; it now feeds into the
    broader eggs-are-unhealthy thesis alongside independent, non-cholesterol
    pillars (TMAO, type 2 diabetes association, saturated fat,
    cooking-oxidation products, Salmonella, allergenicity). No edge connects
    it directly to eggs-fine-in-moderation — the disagreement is still
    structural, visible as two diverging trees built from the same
    underlying cholesterol evidence base.


    The direct evidence for this side: hyper-responders face meaningfully
    elevated LDL and cardiovascular risk from dietary cholesterol and would
    be expected to benefit from limiting it (Katan/Beynen 1987). A pooled
    analysis of 6 large US cohorts (n=29,615, median follow-up 17.5 years)
    found each additional 300 mg/day of dietary cholesterol was associated
    with 17% higher incident CVD risk and 18% higher all-cause mortality,
    and each additional half egg/day with 6% higher CVD risk and 8% higher
    all-cause mortality (Zhong et al. 2019, JAMA).


    The ATBC cohort of 27,078 Finnish men followed up to 31 years found each
    300 mg/day cholesterol increment associated with higher overall (HR
    1.10) and cardiovascular (HR 1.13) mortality (Zhao et al. 2022,
    Circulation). The same 55-cohort dose-response meta-analysis found each
    additional egg/day associated with 7% higher all-cause mortality risk,
    and each 100 mg/day cholesterol increment with 6% higher all-cause
    mortality (Frontiers in Nutrition 2022).


    A systematic review/meta-analysis of 66 RCTs (3,185 participants) found
    egg consumption significantly increases total and LDL cholesterol, most
    clearly at higher intakes in short (<12-week) trials (Khalighi Sikaroudi
    et al. 2020).
  status: reviewed
  tags: [thesis-b]
  sources: [katan1987, jama2019, circulation2022, frontiers2022, khalighi2020]
  confidence: null
  author: 171384n
  created: 2026-07-13

- id: eggs-are-healthy
  case: eggs
  text: "Taken as a whole, eggs are a nutrient-dense, high-quality food whose benefits — complete protein, choline, lutein/zeaxanthin, satiety, and broad micronutrient content — outweigh the risks raised on the other side, and the traditional cholesterol/CVD concern specifically does not hold up for most people."
  label: "Eggs are healthy"
  explanation: >-
    The umbrella root thesis on the 'healthy' side, sitting above
    eggs-fine-in-moderation (the cholesterol-specific sub-thesis) and
    several independent, non-cholesterol pillars: protein quality
    (egg-protein-quality-benefit), satiety/weight management
    (egg-satiety-effect-contested), choline (egg-choline-benefit), and
    eye-health carotenoids plus broader micronutrients
    (egg-micronutrient-benefit).


    Because each pillar is independently sufficient rather than individually
    necessary, no single sub-question here registers as a crux for this root
    — that's a deliberate, accurate consequence of broadening the thesis,
    not an oversight.
  status: reviewed
