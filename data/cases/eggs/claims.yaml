- id: egg-micronutrient-benefit
  case: eggs
  text: "Egg yolks are a concentrated, highly bioavailable source of the eye-health carotenoids lutein and zeaxanthin, and eggs also provide a broad, meaningful share of several other daily micronutrient needs relative to their modest calorie content."
  label: "Egg yolks deliver eye-protective carotenoids and broad micronutrients"
  explanation: >-
    Egg yolks concentrate lutein and zeaxanthin, carotenoids that accumulate
    in the retina's macula and are thought to filter damaging blue light.


    In a controlled feeding trial, eating 2-4 yolks/day for 5 weeks raised
    serum lutein 16-24% and zeaxanthin 36-82%, and raised macular pigment
    optical density up to 50% in people with low baseline levels, without
    harming LDL (HDL rose 5%) (Vishwanathan et al. 2009).


    Bioavailability also seems to matter: a crossover trial giving equal
    lutein doses found roughly 3x higher serum lutein response from
    lutein-enriched eggs than from equal doses via spinach or supplements,
    likely due to the egg's fat matrix (Chung et al. 2004).


    Beyond the eye-health carotenoids, one large egg also provides a broad
    share of several daily micronutrient needs relative to its modest
    ~70-calorie content: about 19% DV vitamin B12, 28% selenium, 18%
    riboflavin, and 5% vitamin D (USDA FoodData Central).
  status: reviewed
  tags: [thesis-healthy]
  sources: [vishwanathan-2009-egg-yolk-macular-pigment, chung-2004-lutein-bioavailability-eggs, usda-fdc-egg-171287]
  confidence: null
