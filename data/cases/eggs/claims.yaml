    cooking/storage (cooking-oxidation-cop-contested), Salmonella/food-safety
    risk (egg-salmonella-risk-contested), and allergenicity
    (egg-allergenicity-narrow-but-real-risk).


    Because each pillar is independently sufficient rather than individually
    necessary, no single sub-question here registers as a crux for this root
    — the same deliberate consequence as on the healthy side.
