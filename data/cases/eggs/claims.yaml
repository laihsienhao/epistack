- id: tmao-cvd-risk-contested
  case: eggs
  text: "Whether egg-derived TMAO elevation meaningfully raises cardiovascular disease risk under habitual egg consumption is contested: acute dose-response trials show eggs raise TMAO, and elevated TMAO independently predicts cardiovascular events in clinical cohorts, but a randomized trial found whole-egg choline (unlike free-choline supplements) did not raise fasting TMAO, and a 2025 meta-analysis of RCTs found no significant pooled effect of egg consumption on circulating TMAO."
  label: "Whether egg-derived TMAO meaningfully raises heart risk is contested"
  explanation: >-
    Gut bacteria metabolize dietary choline/phosphatidylcholine (abundant in
    egg yolks) into trimethylamine (TMA), which the liver oxidizes into
    TMAO — in volunteers eating phosphatidylcholine via eggs, plasma TMAO
    rose in a gut-bacteria-dependent way (suppressed by antibiotics), and
    among 4,007 cardiac-catheterization patients, higher fasting TMAO
    independently predicted higher 3-year risk of major cardiovascular
    events (Tang et al. 2013, NEJM).


    A randomized dose-response trial found consuming 2+ egg yolks produced
    measurable, dose-dependent increases in plasma/urinary TMAO, with
    roughly 11-15% of ingested choline converted to TMAO (Miller et al.
    2014, AJCN).


    On the other hand, a 4-week randomized trial found free-choline
    supplements raised fasting TMAO nearly 6-fold, but whole-egg consumption
    at an equivalent choline dose caused no significant change (Wilcox et
    al. 2021, AJM), and a 2025 systematic review/meta-analysis of RCTs found
    egg consumption had no significant pooled effect on circulating TMAO,
    choline, or betaine (Aryaeian et al. 2025).
  status: reviewed
  tags: [contested]
  sources: [tang2013-tmao-nejm, miller2014-egg-dose-response-ajcn, wilcox2021-choline-vs-eggs-ajm, aryaeian2025-egg-tmao-metaanalysis]
  confidence: null
  author: 171384n
  created: 2026-07-17

- id: egg-t2d-association-region-dependent
  case: eggs
  text: "Whether egg consumption causally raises type 2 diabetes risk, or whether the association reflects confounding by broader US dietary patterns, is contested: the same pooled US cohort analysis found no significant association in an accompanying meta-analysis of 16 international studies (589,559 participants), and a separate dose-response meta-analysis found the elevated risk was driven entirely by US studies (RR 1.47) while high-quality studies alone showed a null result (RR 0.94)."
  label: "Whether eggs raise diabetes risk, or it's US-specific confounding, is contested"
  explanation: >-
    In a pooled analysis of 3 large US cohorts (213,798 participants, 20,514
    incident cases), each additional whole egg/day was associated with a 14%
    higher risk of incident type 2 diabetes — but an accompanying
    meta-analysis of 16 international studies (589,559 participants) found
    no significant association overall, and a separate dose-response
    meta-analysis found the elevated risk was driven entirely by US studies
    (RR 1.47) while high-quality studies alone showed a null result (RR
    0.94) (Drouin-Chartier et al. 2020; Tamez et al. 2016).


    Consistent with a 'not causal, or at least not harmful short-term'
    reading: a 3-month randomized controlled trial in people with existing
    type 2 diabetes found a high-egg diet (2 eggs/day, 6 days/week) produced
    no significant difference in glycemic control or lipid profile vs. a
    low-egg diet (DIABEGG study, Fuller et al. 2015).
  status: reviewed
  tags: [contested]
  sources: [drouin-chartier-2020-t2d-eggs, tamez-2016-bjn-eggs-t2d, diabegg-2015-rct-eggs-t2d]
  confidence: null
  author: 171384n
