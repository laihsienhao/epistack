- id: rct-cholesterol-no-ldl-effect
  case: eggs
  text: "In a randomized cross-over trial (n=61), dietary cholesterol intake up to ~600 mg/day from 2 eggs/day was not significantly associated with LDL cholesterol, while saturated fat intake was the significant driver of LDL differences across matched diets."
  label: "Trial: egg cholesterol didn't raise LDL — saturated fat did"
  explanation: "Carter et al. 2025 (AJCN): across three isocaloric diets differing in cholesterol and saturated fat content, saturated fat intake was positively associated with LDL-C; dietary cholesterol was not. The high-cholesterol/low-saturated-fat egg diet actually produced lower LDL than the egg-free/high-saturated-fat control diet."
  status: reviewed
  tags: [rct, ldl, thesis-a]
  sources: [ajcn2025]
  confidence: null
  author: 171384n
  created: 2026-07-13

