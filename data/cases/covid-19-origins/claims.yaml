- id: mojiang-mine-sample-history-contested
  case: covid-19-origins
  label: "Whether WIV's Mojiang mine sample history is significant is contested"
  text: >-
    In 2012, six workers clearing bat guano from a disused Mojiang, Yunnan
    copper mine developed severe pneumonia and three died; a 2013 Kunming
    Medical University thesis concluded a SARS-like bat coronavirus was the
    likely cause. WIV collected RaTG13 — still the closest known relative of
    SARS-CoV-2 — from that same mineshaft in 2013, but did not publicly
    connect the mine, the miners' illness, and RaTG13 in its own SARS-CoV-2
    origin publications; the link surfaced only when outside researchers
    found and publicized the Chinese-language thesis.
  status: reviewed
  tags: [contested, topic:wiv-biosafety]
  sources: [rahalkar-bahulikar2020-mojiang-frontiers, speciale2021-mojiang-commentary-frontiers]
  confidence: null
  author: 171384n
  created: 2026-07-19
  explanation: >-
    Lab-origin proponents cite WIV's non-disclosure of this specific
    connection — between its closest-known SARS-CoV-2 relative, its
    collection site, and a documented, fatal, coronavirus-suspected illness
    cluster at that site — as an example of underdisclosed sample-collection
    history directly relevant to the pandemic virus's closest relative.
    Natural-origin proponents read the same facts as confirming that this
    remote bat-cave ecosystem is a genuine, independently documented site of
    natural spillover risk, with WIV's own Shi Zhengli stating in a 2020
    interview that the miners died of a fungal infection (histoplasmosis)
    unrelated to coronaviruses — a claim disputed by researchers who
    reexamined the thesis's clinical records but which this graph could not
    independently verify against the original interview.
